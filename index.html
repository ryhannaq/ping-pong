
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sky Pong</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:linear-gradient(to bottom,#ffd6ec,#ffc0dd);
  height:100vh;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* MENU */

.menu-screen{
  position:absolute;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;

  background:linear-gradient(to bottom,#ffd6ec,#ffc0dd);

  z-index:100;
}

.menu-box{
  width:500px;

  padding:40px;

  border-radius:30px;

  background:rgba(255,255,255,0.25);

  border:4px solid #6bb7ff;

  backdrop-filter:blur(10px);

  display:flex;
  flex-direction:column;
  align-items:center;

  gap:25px;

  box-shadow:0 0 30px rgba(0,0,0,0.15);
}

.game-title{
  font-size:70px;
  color:white;
  font-weight:bold;

  text-shadow:4px 4px #6bb7ff;
}

.subtitle{
  color:white;
  font-size:18px;

  text-shadow:2px 2px #6bb7ff;
}

.mode-title{
  color:white;
  font-size:22px;
  font-weight:bold;

  text-shadow:2px 2px #6bb7ff;
}

.menu-buttons{
  width:100%;

  display:flex;
  flex-direction:column;

  gap:15px;
}

button{
  padding:16px;

  border:none;
  border-radius:16px;

  background:white;

  border:3px solid #6bb7ff;

  color:#4c8ed9;

  font-size:18px;
  font-weight:bold;

  cursor:pointer;

  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
  background:#eef7ff;
}

/* GAME */

.game-container{
  display:none;

  flex-direction:column;
  align-items:center;

  gap:25px;
}

.top-bar{
  width:1000px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  background:rgba(255,255,255,0.25);

  border:4px solid #6bb7ff;

  border-radius:22px;

  padding:20px 30px;

  backdrop-filter:blur(10px);
}

.title{
  font-size:34px;
  color:white;
  font-weight:bold;

  text-shadow:3px 3px #6bb7ff;
}

.score-wrapper{
  padding:12px 35px;

  border-radius:20px;

  background:rgba(255,255,255,0.18);

  border:3px solid rgba(255,255,255,0.5);
}

.scoreboard{
  display:flex;
  align-items:center;

  gap:20px;
}

.score{
  font-size:42px;
  color:white;
  font-weight:bold;

  text-shadow:2px 2px #6bb7ff;
}

.right-controls{
  display:flex;
  align-items:center;

  gap:15px;
}

.controls{
  color:white;
  font-size:14px;

  text-shadow:1px 1px #6bb7ff;
}

.menu-btn{
  padding:12px 18px;
  font-size:15px;
}

.game-area{
  padding:18px;

  border-radius:30px;

  background:rgba(255,255,255,0.2);

  border:4px solid #6bb7ff;

  backdrop-filter:blur(8px);
}

canvas{
  display:block;

  border-radius:20px;

  background:linear-gradient(to bottom,#ffdff1,#ffc9e2);

  border:4px solid white;

  box-shadow:0 0 25px rgba(0,0,0,0.15);

  max-width:100%;
  height:auto;
}

</style>
</head>

<body>

<!-- MENU -->

<div class="menu-screen" id="menuScreen">

  <div class="menu-box">

    <div class="game-title">
      SKY PONG
    </div>

    <div class="subtitle">
      Ping Pong pastel
    </div>

    <div class="mode-title">
      Escolha um modo
    </div>

    <div class="menu-buttons">

      <button onclick="startGame('single')">
        Singleplayer
      </button>

      <button onclick="startGame('multi')">
        Multiplayer
      </button>

    </div>

  </div>

</div>

<!-- GAME -->

<div class="game-container" id="gameContainer">

  <div class="top-bar">

    <div class="title">
      SKY PONG
    </div>

    <div class="score-wrapper">

      <div class="scoreboard">

        <div class="score" id="scoreLeft">0</div>

        <div class="score">:</div>

        <div class="score" id="scoreRight">0</div>

      </div>

    </div>

    <div class="right-controls">

      <div class="controls">
        W/S • ↑/↓
      </div>

      <button class="menu-btn" onclick="backToMenu()">
        Menu
      </button>

    </div>

  </div>

  <div class="game-area">

    <canvas id="gameCanvas" width="1000" height="600"></canvas>

  </div>

</div>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const menuScreen = document.getElementById("menuScreen");
const gameContainer = document.getElementById("gameContainer");

let gameMode = "single";
let gameStarted = false;

const maxSpeed = 10;

/* START GAME */

function startGame(mode){

  gameMode = mode;

  menuScreen.style.display = "none";
  gameContainer.style.display = "flex";

  scoreLeft = 0;
  scoreRight = 0;

  updateScore();

  resetBall();

  gameStarted = true;
}

/* MENU */

function backToMenu(){

  gameStarted = false;

  menuScreen.style.display = "flex";
  gameContainer.style.display = "none";

  scoreLeft = 0;
  scoreRight = 0;

  updateScore();

  resetBall();
}

/* CONFIG */

const paddleWidth = 15;
const paddleHeight = 120;

/* PLAYERS */

let leftPaddle = {
  x:20,
  y:240,
  width:paddleWidth,
  height:paddleHeight,
  speed:7
};

let rightPaddle = {
  x:965,
  y:240,
  width:paddleWidth,
  height:paddleHeight,
  speed:7
};

/* BALL */

let ball = {
  x:500,
  y:300,
  radius:12,
  speedX:6,
  speedY:3
};

/* SCORE */

let scoreLeft = 0;
let scoreRight = 0;

/* KEYS */

const keys = {};

document.addEventListener("keydown",(e)=>{
  keys[e.key] = true;
});

document.addEventListener("keyup",(e)=>{
  keys[e.key] = false;
});

/* SCORE */

function updateScore(){

  document.getElementById("scoreLeft").textContent = scoreLeft;
  document.getElementById("scoreRight").textContent = scoreRight;
}

/* RESET BALL */

function resetBall(){

  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;

  ball.speedX = Math.random() > 0.5 ? 6 : -6;
  ball.speedY = (Math.random() * 4) - 2;
}

/* DRAW PADDLE */

function drawPaddle(paddle){

  ctx.fillStyle = "white";
  ctx.strokeStyle = "#6bb7ff";

  ctx.lineWidth = 4;

  ctx.shadowColor = "#ffffff";
  ctx.shadowBlur = 15;

  ctx.beginPath();

  ctx.roundRect(
    paddle.x,
    paddle.y,
    paddle.width,
    paddle.height,
    20
  );

  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;
}

/* DRAW BALL */

function drawBall(){

  ctx.fillStyle = "white";
  ctx.strokeStyle = "#6bb7ff";

  ctx.lineWidth = 4;

  ctx.shadowColor = "#ffffff";
  ctx.shadowBlur = 20;

  ctx.beginPath();

  ctx.arc(
    ball.x,
    ball.y,
    ball.radius,
    0,
    Math.PI * 2
  );

  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;
}

/* COLLISION */

function handlePaddleCollision(paddle,isLeft){

  let collidePoint =
  ball.y - (paddle.y + paddle.height / 2);

  collidePoint =
  collidePoint / (paddle.height / 2);

  let angle =
  collidePoint * (Math.PI / 4);

  let speed = Math.sqrt(
    ball.speedX * ball.speedX +
    ball.speedY * ball.speedY
  );

  speed += 0.3;

  if(speed > maxSpeed){
    speed = maxSpeed;
  }

  if(isLeft){

    ball.speedX =
    Math.abs(speed * Math.cos(angle));

    ball.x =
    paddle.x +
    paddle.width +
    ball.radius + 1;

  }else{

    ball.speedX =
    -Math.abs(speed * Math.cos(angle));

    ball.x =
    paddle.x -
    ball.radius - 1;
  }

  ball.speedY =
  speed * Math.sin(angle);
}

/* UPDATE */

function update(){

  if(!gameStarted) return;

  /* LEFT */

  if(keys["w"] && leftPaddle.y > 0){
    leftPaddle.y -= leftPaddle.speed;
  }

  if(keys["s"] &&
  leftPaddle.y < canvas.height - leftPaddle.height){
    leftPaddle.y += leftPaddle.speed;
  }

  /* RIGHT */

  if(gameMode === "multi"){

    if(keys["ArrowUp"] && rightPaddle.y > 0){
      rightPaddle.y -= rightPaddle.speed;
    }

    if(keys["ArrowDown"] &&
    rightPaddle.y < canvas.height - rightPaddle.height){
      rightPaddle.y += rightPaddle.speed;
    }

  }else{

    let center =
    rightPaddle.y + rightPaddle.height / 2;

    if(center < ball.y - 35){
      rightPaddle.y += 5;
    }

    if(center > ball.y + 35){
      rightPaddle.y -= 5;
    }
  }

  /* LIMITS */

  if(rightPaddle.y < 0){
    rightPaddle.y = 0;
  }

  if(rightPaddle.y >
  canvas.height - rightPaddle.height){
    rightPaddle.y =
    canvas.height - rightPaddle.height;
  }

  /* MOVE BALL */

  ball.x += ball.speedX;
  ball.y += ball.speedY;

  /* WALL COLLISION */

  if(ball.y - ball.radius <= 0){

    ball.y = ball.radius;
    ball.speedY *= -1;
  }

  if(ball.y + ball.radius >= canvas.height){

    ball.y = canvas.height - ball.radius;
    ball.speedY *= -1;
  }

  /* LEFT COLLISION */

  if(

    ball.speedX < 0 &&

    ball.x - ball.radius <=
    leftPaddle.x + leftPaddle.width &&

    ball.x - ball.radius >=
    leftPaddle.x &&

    ball.y + ball.radius >=
    leftPaddle.y &&

    ball.y - ball.radius <=
    leftPaddle.y + leftPaddle.height

  ){
    handlePaddleCollision(leftPaddle,true);
  }

  /* RIGHT COLLISION */

  if(

    ball.speedX > 0 &&

    ball.x + ball.radius >=
    rightPaddle.x &&

    ball.x + ball.radius <=
    rightPaddle.x + rightPaddle.width &&

    ball.y + ball.radius >=
    rightPaddle.y &&

    ball.y - ball.radius <=
    rightPaddle.y + rightPaddle.height

  ){
    handlePaddleCollision(rightPaddle,false);
  }

  /* SCORE */

  if(ball.x < 0){

    scoreRight++;
    updateScore();

    checkWinner();

    resetBall();
  }

  if(ball.x > canvas.width){

    scoreLeft++;
    updateScore();

    checkWinner();

    resetBall();
  }
}

/* WINNER */

function checkWinner(){

  if(scoreLeft >= 5){

    setTimeout(()=>{
      alert("Player 1 venceu!");
      backToMenu();
    },100);
  }

  if(scoreRight >= 5){

    setTimeout(()=>{

      if(gameMode === "single"){
        alert("CPU venceu!");
      }else{
        alert("Player 2 venceu!");
      }

      backToMenu();

    },100);
  }
}

/* DRAW */

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* CENTER LINE */

  ctx.strokeStyle = "rgba(255,255,255,0.5)";
  ctx.lineWidth = 4;

  ctx.setLineDash([12,16]);

  ctx.beginPath();

  ctx.moveTo(canvas.width/2,0);
  ctx.lineTo(canvas.width/2,canvas.height);

  ctx.stroke();

  ctx.setLineDash([]);

  drawPaddle(leftPaddle);
  drawPaddle(rightPaddle);

  drawBall();
}

/* LOOP */

function gameLoop(){

  update();
  draw();

  requestAnimationFrame(gameLoop);
}

updateScore();
gameLoop();

</script>

</body>
</html>
