<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Ping Pong</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        h1 { margin-bottom: 10px; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }
        #menu { display: flex; gap: 20px; margin-bottom: 20px; }
        button { padding: 12px 24px; font-size: 1rem; font-weight: bold; border: 2px solid #fff; background: transparent; color: #fff; cursor: pointer; transition: all 0.3s ease; border-radius: 5px; }
        button:hover, button.active { background-color: #fff; color: #111; }
        #gameContainer { border: 4px solid #fff; background-color: #000; }
        canvas { display: block; }
        #instrucoes { margin-top: 15px; font-size: 0.9rem; color: #aaa; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

    <h1>Ping Pong</h1>

    <div id="menu">
        <button id="btnSolo" class="active" onclick="mudarModo('solo')">1 Jogador (vs IA)</button>
        <button id="btnMulti" onclick="mudarModo('multi')">2 Jogadores (Local)</button>
    </div>

    <div id="gameContainer">
        <canvas id="pong" width="800" height="500"></canvas>
    </div>

    <div id="instrucoes">
        <span id="textoControles"><strong>Controles:</strong><br>Jogador 1 (Esquerda): Teclas <strong>W</strong> (Cima) e <strong>S</strong> (Baixo)<br>IA controla o lado direito</span>
    </div>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        let modoJogo = "solo"; 
        const velocidadeIA = 0.06; 

        const jg1 = { x: 10, y: 200, w: 15, h: 100, score: 0, cor: "#FFF" };
        const jg2 = { x: 775, y: 200, w: 15, h: 100, score: 0, cor: "#FFF" };
        const bola = { x: 400, y: 250, r: 10, velocidade: 7, dx: 7, dy: 7, cor: "#FFF" };

        const teclas = {};

        window.addEventListener("keydown", e => teclas[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => teclas[e.key.toLowerCase()] = false);

        function mudarModo(modo) {
            modoJogo = modo;
            document.getElementById("btnSolo").classList.toggle("active", modo === "solo");
            document.getElementById("btnMulti").classList.toggle("active", modo === "multi");
            
            const instrucoes = document.getElementById("textoControles");
            if (modo === "solo") {
                instrucoes.innerHTML = "<strong>Controles:</strong><br>Jogador 1 (Esquerda): Teclas <strong>W</strong> (Cima) e <strong>S</strong> (Baixo)<br>IA controla o lado direito";
            } else {
                instrucoes.innerHTML = "<strong>Controles:</strong><br>Jogador 1 (Esquerda): Teclas <strong>W</strong> / <strong>S</strong><br>Jogador 2 (Direita): Setas do Teclado <strong>Seta Cima</strong> / <strong>Seta Baixo</strong>";
            }
            resetarJogoTotal();
        }

        function dRet(x, y, w, h, cor) {
            ctx.fillStyle = cor;
            ctx.fillRect(x, y, w, h);
        }

        function dCirc(x, y, r, cor) {
            ctx.fillStyle = cor;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        function dRede() {
            for (let i = 0; i <= canvas.height; i += 20) {
                dRet(canvas.width / 2 - 1, i, 2, 10, "#555");
            }
        }

        function dTexto(txt, x, y) {
            ctx.fillStyle = "#FFF";
            ctx.font = "45px sans-serif";
            ctx.fillText(txt, x, y);
        }

        function resetarBola() {
            bola.x = canvas.width / 2;
            bola.y = canvas.height / 2;
            bola.dx = -bola.dx;
            bola.velocidade = 7;
        }

        function resetarJogoTotal() {
            jg1.score = 0;
            jg2.score = 0;
            jg1.y = canvas.height / 2 - jg1.h / 2;
            jg2.y = canvas.height / 2 - jg2.h / 2;
            resetarBola();
        }

        function colisao(b, p) {
            return b.x + b.r > p.x && b.x - b.r < p.x + p.w && b.y + b.r > p.y && b.y - b.r < p.y + p.h;
        }

        function atualizar() {
            if (teclas['w'] && jg1.y > 0) jg1.y -= 8;
            if (teclas['s'] && jg1.y < canvas.height - jg1.h) jg1.y += 8;

            if (modoJogo === "multi") {
                if (teclas['arrowup'] && jg2.y > 0) jg2.y -= 8;
                if (teclas['arrowdown'] && jg2.y < canvas.height - jg2.h) jg2.y += 8;
            } else {
                let alvoY = bola.y - (jg2.h / 2);
                jg2.y += (alvoY - jg2.y) * velocidadeIA;
                if (jg2.y < 0) jg2.y = 0;
                if (jg2.y > canvas.height - jg2.h) jg2.y = canvas.height - jg2.h;
            }

            bola.x += bola.dx;
            bola.y += bola.dy;

            if (bola.y - bola.r < 0 || bola.y + bola.r > canvas.height) {
                bola.dy = -bola.dy;
            }

            let jogadorAtua = (bola.x < canvas.width / 2) ? jg1 : jg2;

            if (colisao(bola, jogadorAtua)) {
                let pontoImpacto = (bola.y - (jogadorAtua.y + jogadorAtua.h / 2));
                pontoImpacto = pontoImpacto / (jogadorAtua.h / 2);
                
                let anguloRad = (Math.PI / 4) * pontoImpacto;
                let direcao = (bola.x < canvas.width / 2) ? 1 : -1;
                
                bola.dx = direcao * bola.velocidade * Math.cos(anguloRad);
                bola.dy = bola.velocidade * Math.sin(anguloRad);
                
                bola.velocidade += 0.5;
            }

            if (bola.x - bola.r < 0) {
                jg2.score++;
                resetarBola();
            } else if (bola.x + bola.r > canvas.width) {
                jg1.score++;
                resetarBola();
            }
        }

        function renderizar() {
            dRet(0, 0, canvas.width, canvas.height, "#000");
            dRede();
            dTexto(jg1.score, canvas.width / 4, 60);
            dTexto(jg2.score, 3 * canvas.width / 4, 60);
            dRet(jg1.x, jg1.y, jg1.w, jg1.h, jg1.cor);
            dRet(jg2.x, jg2.y, jg2.w, jg2.h, jg2.cor);
            dCirc(bola.x, bola.y, bola.r, bola.cor);
        }

        function loop() {
            atualizar();
            renderizar();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
