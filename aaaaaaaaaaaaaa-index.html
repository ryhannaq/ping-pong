```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sky Pong</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #ffd6ec, #ffc0dd);
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      border: 4px solid #6bb7ff;
      border-radius: 20px;
      background: linear-gradient(to bottom, #ffdff1, #ffc9e2);
      box-shadow: 0 0 30px rgba(0,0,0,0.2);
    }

    .menu {
      position: absolute;
      top: 20px;
      display: flex;
      gap: 15px;
      z-index: 10;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: white;
      color: #4c8ed9;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      border: 3px solid #6bb7ff;
    }

    button:hover {
      transform: scale(1.05);
      background: #e8f4ff;
    }

    .title {
      position: absolute;
      top: 80px;
      font-size: 42px;
      color: white;
      text-shadow: 3px 3px #6bb7ff;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="menu">
    <button onclick="setMode('single')">☁ Singleplayer</button>
    <button onclick="setMode('multi')">☁ Multiplayer</button>
  </div>

  <div class="title">SKY PONG</div>

  <canvas id="gameCanvas" width="1000" height="600"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let gameMode = "single";

    function setMode(mode) {
      gameMode = mode;
      resetBall();
    }

    const paddleWidth = 15;
    const paddleHeight = 120;

    let leftPaddle = {
      x: 20,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 7
    };

    let rightPaddle = {
      x: canvas.width - 35,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 7
    };

    let ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: 12,
      speedX: 6,
      speedY: 6
    };

    let scoreLeft = 0;
    let scoreRight = 0;

    const keys = {};

    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;

      ball.speedX = (Math.random() > 0.5 ? 6 : -6);
      ball.speedY = (Math.random() > 0.5 ? 6 : -6);
    }

    function drawCloud(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      ctx.fillStyle = "white";
      ctx.strokeStyle = "#6bb7ff";
      ctx.lineWidth = 4;

      ctx.beginPath();
      ctx.arc(0, 0, 25, 0, Math.PI * 2);
      ctx.arc(30, -10, 30, 0, Math.PI * 2);
      ctx.arc(60, 0, 25, 0, Math.PI * 2);
      ctx.arc(30, 15, 28, 0, Math.PI * 2);
      ctx.closePath();

      ctx.fill();
      ctx.stroke();

      ctx.restore();
    }

    function drawBackground() {
      drawCloud(150, 120, 1.2);
      drawCloud(400, 80, 0.9);
      drawCloud(700, 140, 1.4);
      drawCloud(850, 70, 0.8);
    }

    function drawPaddle(paddle) {
      ctx.fillStyle = "white";
      ctx.strokeStyle = "#6bb7ff";
      ctx.lineWidth = 4;

      ctx.beginPath();
      ctx.roundRect(
        paddle.x,
        paddle.y,
        paddle.width,
        paddle.height,
        20
      );

      ctx.fill();
      ctx.stroke();
    }

    function drawBall() {
      ctx.fillStyle = "white";
      ctx.strokeStyle = "#6bb7ff";
      ctx.lineWidth = 4;

      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }

    function drawScore() {
      ctx.fillStyle = "white";
      ctx.font = "48px Arial";
      ctx.strokeStyle = "#6bb7ff";
      ctx.lineWidth = 3;

      ctx.strokeText(scoreLeft, canvas.width / 2 - 100, 60);
      ctx.strokeText(scoreRight, canvas.width / 2 + 70, 60);

      ctx.fillText(scoreLeft, canvas.width / 2 - 100, 60);
      ctx.fillText(scoreRight, canvas.width / 2 + 70, 60);
    }

    function update() {
      // Player 1
      if (keys["w"] && leftPaddle.y > 0) {
        leftPaddle.y -= leftPaddle.speed;
      }

      if (keys["s"] && leftPaddle.y < canvas.height - leftPaddle.height) {
        leftPaddle.y += leftPaddle.speed;
      }

      // Player 2 ou IA
      if (gameMode === "multi") {
        if (keys["ArrowUp"] && rightPaddle.y > 0) {
          rightPaddle.y -= rightPaddle.speed;
        }

        if (keys["ArrowDown"] && rightPaddle.y < canvas.height - rightPaddle.height) {
          rightPaddle.y += rightPaddle.speed;
        }
      } else {
        // IA simples
        let center = rightPaddle.y + rightPaddle.height / 2;

        if (center < ball.y - 35) {
          rightPaddle.y += 5;
        } else if (center > ball.y + 35) {
          rightPaddle.y -= 5;
        }
      }

      // Movimento da bola
      ball.x += ball.speedX;
      ball.y += ball.speedY;

      // Colisão topo/baixo
      if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
        ball.speedY *= -1;
      }

      // Colisão esquerda
      if (
        ball.x - ball.radius < leftPaddle.x + leftPaddle.width &&
        ball.y > leftPaddle.y &&
        ball.y < leftPaddle.y + leftPaddle.height
      ) {
        ball.speedX *= -1.05;
      }

      // Colisão direita
      if (
        ball.x + ball.radius > rightPaddle.x &&
        ball.y > rightPaddle.y &&
        ball.y < rightPaddle.y + rightPaddle.height
      ) {
        ball.speedX *= -1.05;
      }

      // Pontuação
      if (ball.x < 0) {
        scoreRight++;
        resetBall();
      }

      if (ball.x > canvas.width) {
        scoreLeft++;
        resetBall();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBackground();

      // Linha central
      ctx.strokeStyle = "rgba(255,255,255,0.5)";
      ctx.setLineDash([10, 15]);

      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();

      ctx.setLineDash([]);

      drawPaddle(leftPaddle);
      drawPaddle(rightPaddle);
      drawBall();
      drawScore();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>

</body>
</html>
