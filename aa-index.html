<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ping Pong - Humano vs IA</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }
        .instrucoes {
            position: absolute;
            top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="instrucoes">
        <h2>Você (Esquerda) vs IA (Direita)</h2>
        <p>Use <b>W</b> para subir e <b>S</b> para descer</p>
    </div>

    <canvas id="pongCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");

        // Configurações
        const paddleWidth = 10, paddleHeight = 80;
        let leftPaddleY = (canvas.height - paddleHeight) / 2;
        let rightPaddleY = (canvas.height - paddleHeight) / 2;
        
        let ballX = canvas.width / 2, ballY = canvas.height / 2;
        let ballSpeedX = 5, ballSpeedY = 5;
        
        let scorePlayer = 0, scoreIA = 0;
        const iaSpeed = 4.5; // Velocidade da IA (ajuste para dificultar ou facilitar)

        const keys = {};
        document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        function update() {
            // Movimento do Jogador (W e S)
            if (keys['w'] && leftPaddleY > 0) leftPaddleY -= 8;
            if (keys['s'] && leftPaddleY < canvas.height - paddleHeight) leftPaddleY += 8;

            // --- LÓGICA DA IA (Lado Direito) ---
            let targetY = ballY - (paddleHeight / 2);
            if (rightPaddleY < targetY) {
                rightPaddleY += iaSpeed;
            } else {
                rightPaddleY -= iaSpeed;
            }

            // Movimento da bola
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Colisão teto e chão
            if (ballY <= 0 || ballY >= canvas.height) ballSpeedY *= -1;

            // Colisão com raquete do Jogador
            if (ballX <= paddleWidth) {
                if (ballY > leftPaddleY && ballY < leftPaddleY + paddleHeight) {
                    ballSpeedX = Math.abs(ballSpeedX) + 0.2; // Aumenta velocidade gradualmente
                    ballSpeedX *= 1; 
                } else if (ballX < 0) {
                    scoreIA++;
                    resetBall();
                }
            }

            // Colisão com raquete da IA
            if (ballX >= canvas.width - paddleWidth) {
                if (ballY > rightPaddleY && ballY < rightPaddleY + paddleHeight) {
                    ballSpeedX = (Math.abs(ballSpeedX) + 0.2) * -1;
                } else if (ballX > canvas.width) {
                    scorePlayer++;
                    resetBall();
                }
            }
        }

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = (ballSpeedX > 0 ? -5 : 5);
            ballSpeedY = 5;
        }

        function draw() {
            // Fundo
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Linha tracejada central
            ctx.strokeStyle = "#555";
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // Raquetes
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, leftPaddleY, paddleWidth, paddleHeight);
            ctx.fillRect(canvas.width - paddleWidth, rightPaddleY, paddleWidth, paddleHeight);

            // Bola quadrada (estilo retrô)
            ctx.fillRect(ballX - 5, ballY - 5, 10, 10);

            // Placar
            ctx.font = "50px 'Courier New'";
            ctx.fillText(scorePlayer, canvas.width / 4, 60);
            ctx.fillText(scoreIA, 3 * canvas.width / 4, 60);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
