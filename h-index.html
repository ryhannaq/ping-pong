   </html>
</script>
</body>

    <div id="instrucoes">
        <strong>Controles:</strong><br>
        Mover para CIMA: Tecla <strong>W</strong><br>
        Mover para BAIXO: Tecla <strong>S</strong><br>
        <span style="color: #66ff66;">O segundo jogador é controlado automaticamente pela IA!</span>
    </div>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        // Configurações da Inteligência Artificial
        // 0.05 = Fácil | 0.08 = Médio | 0.12 = Difícil
        const velocidadeIA = 0.08; 

        // Objetos do Jogo
        const jogador = { x: 10, y: 200, w: 15, h: 100, score: 0, cor: "#FFF" };
        const ia = { x: 775, y: 200, w: 15, h: 100, score: 0, cor: "#FFF" };
        const bola = { x: 400, y: 250, r: 10, velocidade: 6, dx: 6, dy: 6, cor: "#FFF" };

        // Controle de Teclado
        const teclas = {};
        window.addEventListener("keydown", e => teclas[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => teclas[e.key.toLowerCase()] = false);

        // Desenhar Retângulos
        function dRet(x, y, w, h, cor) {
            ctx.fillStyle = cor;
            ctx.fillRect(x, y, w, h);
        }

        // Desenhar Bola
        function dCirc(x, y, r, cor) {
            ctx.fillStyle = cor;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        // Desenhar Rede Central
        function dRede() {
            for (let i = 0; i <= canvas.height; i += 20) {
                dRet(canvas.width / 2 - 1, i, 2, 10, "#444");
            }
        }

        // Desenhar Placar
        function dTexto(txt, x, y) {
            ctx.fillStyle = "#FFF";
            ctx.font = "bold 50px sans-serif";
            ctx.fillText(txt, x, y);
        }

        // Resetar Bola após Ponto
        function resetarBola() {
            bola.x = canvas.width / 2;
            bola.y = canvas.height / 2;
            bola.dx = (Math.random() > 0.5 ? 1 : -1) * 6;
            bola.dy = (Math.random() > 0.5 ? 1 : -1) * 6;
            bola.velocidade = 6;
        }

        // Detecção de Colisão Direta
        function colisao(b, p) {
            return b.x + b.r > p.x && b.x - b.r < p.x + p.w && b.y + b.r > p.y && b.y - b.r < p.y + p.h;
        }

        // Lógica de Movimentos e Física
        function atualizar() {
            // Movimento do Jogador 1 (W e S)
            if (teclas['w'] && jogador.y > 0) jogador.y -= 8;
            if (teclas['s'] && jogador.y < canvas.height - jogador.h) jogador.y += 8;

            // Movimento Computadorizado da IA
            let alvoY = bola.y - (ia.h / 2);
            ia.y += (alvoY - ia.y) * velocidadeIA;

            // Bloquear IA dentro dos limites da tela
            if (ia.y < 0) ia.y = 0;
            if (ia.y > canvas.height - ia.h) ia.y = canvas.height - ia.h;

            // Mover Bola
            bola.x += bola.dx;
            bola.y += bola.dy;

            // Colisão com Paredes (Teto e Chão)
            if (bola.y - bola.r < 0 || bola.y + bola.r > canvas.height) {
                bola.dy = -bola.dy;
            }

            // Define qual rebatedor a bola está próxima
            let rebatedor = (bola.x < canvas.width / 2) ? jogador : ia;

            // Lógica de Rebatida com Ângulo Dinâmico
            if (colisao(bola, rebatedor)) {
                let pontoImpacto = (bola.y - (rebatedor.y + rebatedor.h / 2)) / (rebatedor.h / 2);
                let anguloRad = (Math.PI / 4) * pontoImpacto;
                let direcao = (bola.x < canvas.width / 2) ? 1 : -1;
                
                bola.dx = direcao * bola.velocidade * Math.cos(anguloRad);
                bola.dy = bola.velocidade * Math.sin(anguloRad);
                
                // Aumenta velocidade gradualmente
                bola.velocidade += 0.4;
            }

            // Sistema de Pontuação
            if (bola.x - bola.r < 0) {
                ia.score++;
                resetarBola();
            } else if (bola.x + bola.r > canvas.width) {
                jogador.score++;
                resetarBola();
            }
        }

        // Atualizar Visual da Tela
        function renderizar() {
            dRet(0, 0, canvas.width, canvas.height, "#000");
            dRede();
            dTexto(jogador.score, canvas.width / 4, 60);
            dTexto(ia.score, 3 * canvas.width / 4, 60);
            dRet(jogador.x, jogador.y, jabor.w || jogador.w, jogador.h, jogador.cor);
            dRet(ia.x, ia.y, ia.w, ia.h, ia.cor);
            dCirc(bola.x, bola.y, bola.r, bola.cor);
        }

        // Loop de Execução Contínua
        function loop() {
            atualizar();
            renderizar();
            requestAnimationFrame(loop);
        }

        // Inicialização Direta do Jogo
        resetarBola();
        loop();
    </script>
</body>
</html>
